<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poo Punch Game for Nitu</title>
    <style>
        /* General Page Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            margin: 0;
            overflow: hidden;
        }

        /* Game Container */
        #game-container {
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #health-bar {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #d32f2f;
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 50;
        }

        /* The Character Container */
        #character-wrapper {
            position: relative;
            animation: dodgeSideToSide 2.5s infinite alternate ease-in-out;
            cursor: pointer;
        }

        #character-wrapper.dead {
            animation: none; /* Stop moving when dead */
        }

        /* The Video Player */
        #character-video {
            width: 300px; /* Adjust size of your video here */
            height: auto;
            border-radius: 15px; /* Rounds the corners of your video */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            pointer-events: none; /* Let the clicks pass to the wrapper */
        }

        /* Side to Side Animation Rules */
        @keyframes dodgeSideToSide {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(100px); }
        }

        /* Poo Punch Animation */
        #poo-punch {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            top: 30%;
            left: 20%;
            transition: opacity 0.1s, transform 0.1s;
            z-index: 20;
            pointer-events: none;
        }

        #poo-punch.hit {
            opacity: 1;
            transform: scale(1.3);
        }

        /* Reward Screen */
        #reward-screen {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #ffeb3b;
            z-index: 60;
            text-align: center;
        }

        #reward-screen h1 {
            font-size: 50px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(255,255,255,0.3);
        }

        #reward-screen .coffee {
            font-size: 100px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="health-bar">HP: 10 / 10</div>
        
        <div id="character-wrapper">
            <div id="poo-punch">💩🥊</div>
            <video id="character-video" src="normal.mp4" autoplay loop muted playsinline></video>
        </div>
    </div>

    <div id="reward-screen">
        <h1>A coffee cup for u Nitu!</h1>
        <div class="coffee">☕</div>
    </div>

    <script>
        let health = 10;
        let isDead = false;
        let isHit = false;

        const characterWrapper = document.getElementById('character-wrapper');
        const videoPlayer = document.getElementById('character-video');
        const healthBar = document.getElementById('health-bar');
        const pooPunch = document.getElementById('poo-punch');
        const rewardScreen = document.getElementById('reward-screen');

        // Video Sources (Make sure filenames match exactly!)
        const VIDEO_NORMAL = 'normal.mp4';
        const VIDEO_MOCKING = 'mocking.mp4';
        const VIDEO_HIT = 'hit.mp4';
        const VIDEO_DEAD = 'dead.mp4';

        // 1. Mocking expression every 6 seconds
        const mockInterval = setInterval(() => {
            if (isDead || isHit) return; 
            
            // Switch to mocking video
            videoPlayer.src = VIDEO_MOCKING; 
            
            // Go back to normal after 2 seconds (adjust based on how long your mocking video is)
            setTimeout(() => {
                if (!isDead && !isHit) {
                    videoPlayer.src = VIDEO_NORMAL;
                }
            }, 2000); 
        }, 6000);

        // 2. Hitting the character
        characterWrapper.addEventListener('click', () => {
            if (isDead) return; 

            health--;
            healthBar.innerText = `HP: ${health} / 10`;
            isHit = true;

            // Show hit video and poo punch
            videoPlayer.src = VIDEO_HIT;
            pooPunch.classList.add('hit');

            if (health <= 0) {
                isDead = true;
                clearInterval(mockInterval);
                triggerDeathSequence();
            } else {
                // Recover from the hit after 1 second (adjust based on hit video length)
                setTimeout(() => {
                    if (!isDead) {
                        videoPlayer.src = VIDEO_NORMAL;
                        isHit = false;
                    }
                    pooPunch.classList.remove('hit');
                }, 1000);
            }
        });

        // 3. Falling down and showing the reward
        function triggerDeathSequence() {
            characterWrapper.classList.add('dead'); // Stops the dodging animation
            pooPunch.classList.remove('hit');

            // Play the falling back/dead video
            videoPlayer.src = VIDEO_DEAD;
            // Turn off loop so he stays dead at the end of the clip
            videoPlayer.loop = false; 

            // Wait a few seconds for the falling video to finish playing before showing the reward
            setTimeout(() => {
                rewardScreen.style.display = 'flex';
            }, 2500); // 2.5 seconds (adjust based on dead video length)
        }
    </script>
</body>
</html>
